<style>
    .tools-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.5rem;
    }

    /* responsive collapse */
    @media (max-width: 900px) {
        .tools-grid {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    @media (max-width: 600px) {
        .tools-grid {
            grid-template-columns: 1fr;
        }
    }

    /* optional: ensures cards behave consistently */
    .tools-grid .card {
        display: block;
    }
</style>

<div class="container">

    <header class="card" style="text-align: center; margin-bottom: 2rem;">
        <h1>Class Tools</h1>
        <p style="color: var(--muted); margin: 0;">
            Quick access hub for classroom utilities
        </p>
    </header>

    <div class="tools-grid">

        <div class="card">
            <a href="/class-tools/chart/">Classroom Randomizer</a>
            <div style="font-size: 0.9rem; color: var(--muted); margin-top: 0.4rem;">
                Seating charts, group generator, and roster tools
            </div>
        </div>

        <div class="card">
            <a href="/class-tools/wheel/">Spin da wheel</a>
            <div style="font-size: 0.9rem; color: var(--muted); margin-top: 0.4rem;">
                Create charts or winners from a wheel.
            </div>
        </div>

        <div class="card">
            <a href="/class-tools/timer/">Long timer</a>
            <div style="font-size: 0.9rem; color: var(--muted); margin-top: 0.4rem;">
                A simple, full-screen timer for classroom use.
            </div>
        </div>

    </div>

</div>
