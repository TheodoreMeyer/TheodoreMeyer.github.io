name: SVG Docs Build

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [svg-docs-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout website repo
        uses: actions/checkout@v4

      # IMPORTANT: keep external repo OUT of Jekyll tree
      - name: Checkout SimpleVoice-Geyser repo (staging only)
        uses: actions/checkout@v4
        with:
          repository: TheodoreMeyer/SimpleVoice-Geyser
          path: _svg_build

      - name: Sync docs into Jekyll project folder
        run: |
          rm -rf projects/simplevoicegeyser
          mkdir -p projects/simplevoicegeyser

          # copy only docs (no folder leakage)
          cp -r _svg_build/docs/* projects/simplevoicegeyser/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy
        uses: actions/deploy-pages@v4