name: SVG Docs Build

on:
  push:
    branches:
      - main

  workflow_dispatch:

  repository_dispatch:
    types:
      - svg-docs-updated

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout website
        uses: actions/checkout@v4

      - name: Checkout SimpleVoice-Geyser
        uses: actions/checkout@v4
        with:
          repository: TheodoreMeyer/SimpleVoice-Geyser
          ref: master
          path: svg

      - name: Inject SVG docs
        run: |
          rm -rf projects/simplevoicegeyser/docs
          mkdir -p projects/simplevoicegeyser/docs
          cp -R svg/docs/. projects/simplevoicegeyser/docs/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4