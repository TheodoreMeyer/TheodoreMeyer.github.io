name: SVG Docs Build

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [svg-docs-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout website
        uses: actions/checkout@v4

      - name: Checkout SimpleVoice-Geyser
        uses: actions/checkout@v4
        with:
          repository: TheodoreMeyer/SimpleVoice-Geyser
          path: _svg_build

      - name: Copy docs
        run: |
          rm -rf projects/simplevoicegeyser
          mkdir -p projects/simplevoicegeyser
          cp -r _svg_build/docs/* projects/simplevoicegeyser/

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true

      - name: Install gems
        run: bundle install

      - name: Build site
        run: bundle exec jekyll build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        uses: actions/deploy-pages@v4