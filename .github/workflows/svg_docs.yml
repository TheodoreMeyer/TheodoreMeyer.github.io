name: SVG Docs Build

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [svg-docs-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout website
        uses: actions/checkout@v4

      - name: Checkout SVG repo
        uses: actions/checkout@v4
        with:
          repository: TheodoreMeyer/SimpleVoice-Geyser
          ref: master
          path: svg

      - name: Setup Python
        run: python3 -m pip install pyyaml

      - name: Build docs (ALL IN ONE)
        run: |
          python3 scripts/build_docs.py svg/docs projects simplevoicegeyser

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy
        uses: actions/deploy-pages@v4