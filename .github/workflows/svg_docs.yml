name: SVG Docs Build

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [svg-docs-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout website
        uses: actions/checkout@v4

      - name: Checkout SVG repo
        uses: actions/checkout@v4
        with:
          repository: TheodoreMeyer/SimpleVoice-Geyser
          ref: master
          path: svg

      - name: Setup Python
        run: python3 -m pip install pyyaml

      - name: Read project metadata
        id: project
        run: |
          python3 scripts/extract_meta.py >> $GITHUB_OUTPUT

      - name: Build docs structure
        run: |
          rm -rf projects/${{ steps.project.outputs.slug }}
          mkdir -p projects/${{ steps.project.outputs.slug }}

          cp -R svg/docs/* projects/${{ steps.project.outputs.slug }}/

      - name: Normalize markdown + inject Jekyll frontmatter
        run: python3 scripts/prepare_docs.py projects/${{ steps.project.outputs.slug }}

      - name: Generate sidebar tree
        run: python3 scripts/generate_sidebar.py projects/${{ steps.project.outputs.slug }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4