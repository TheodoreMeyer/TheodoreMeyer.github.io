name: SVG Docs Build

on:
  push:
    branches:
      - main

  workflow_dispatch:

  repository_dispatch:
    types:
      - svg-docs-updated

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout website
        uses: actions/checkout@v4

      - name: Checkout SimpleVoice-Geyser
        uses: actions/checkout@v4
        with:
          repository: TheodoreMeyer/SimpleVoice-Geyser
          ref: master
          path: svg

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Read project metadata
        id: project
        run: |
          SLUG=$(yq '.slug' svg/docs/_project.yml)
          TITLE=$(yq '.title' svg/docs/_project.yml)

          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      - name: Copy docs
        run: |
          SLUG="${{ steps.project.outputs.slug }}"

          rm -rf "projects/$SLUG"
          mkdir -p "projects/$SLUG"

          cp -R svg/docs/. "projects/$SLUG/"

      - name: Copy metadata
        run: |
          mkdir -p _data/projects

          cp svg/docs/_project.yml \
            "_data/projects/${{ steps.project.outputs.slug }}.yml"

      - name: Install Python dependencies
        run: |
          python3 -m pip install pyyaml

      - name: Prepare docs
        run: |
          python3 scripts/prepare_docs.py \
            "projects/${{ steps.project.outputs.slug }}"

      - name: Show prepared docs
        run: |
          echo "==================="
          find projects -name "*.md" -exec echo "FILE: {}" \; -exec cat {} \;

      - name: Generate docs navigation
        run: |
          python3 scripts/generate_docs_nav.py \
            "projects/${{ steps.project.outputs.slug }}"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Show generated site
        run: |
          find _site | sort

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4