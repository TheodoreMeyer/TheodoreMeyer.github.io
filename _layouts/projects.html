<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }}</title>

    <!-- Your styles ONLY -->
    <link rel="stylesheet" href="{{ '/assets/css/projects.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/sidebar.css' | relative_url }}">
</head>
<body>

{% include header.html %}

<main class="page-content">

    {% if page.sidebar %}
    <div class="project-wrapper">

        {% include project_sidebar.html %}

        <div class="content-wrapper">
            {{ content }}
        </div>

    </div>
    {% else %}
    <div class="content-wrapper" style="max-width: 800px; margin: 2rem auto;">
        {{ content }}
    </div>
    {% endif %}

</main>

{% include footer.html %}

</body>
</html>
