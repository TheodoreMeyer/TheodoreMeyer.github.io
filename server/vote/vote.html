---
layout: default
title: Vote
permalink: /server/votes/vote
---

<h2 id="question">Authenticating...</h2>
<div id="options"></div>
<div id="results"></div>

<script src="/server/js/auth.js"></script>

<script>

    const params = new URLSearchParams(window.location.search);
    const voteID = params.get("vote");

    function loadVote(){

        const script = document.createElement("script");

        script.src =
            `${API}?action=getVote&vote=${voteID}&client=${CLIENT_TOKEN}&callback=renderVote`;

        document.body.appendChild(script);

    }

    function renderVote(vote){

        document.getElementById("question").innerText = vote.question;

        const optionsDiv = document.getElementById("options");

        optionsDiv.innerHTML = "";

        vote.options.forEach(opt=>{

            const card = document.createElement("div");

            card.className = "vote-option";

            card.onclick = ()=> submitVote(opt.name);

            card.innerHTML =
                `<b>${opt.name}</b><span>${opt.votes} pts</span>`;

            optionsDiv.appendChild(card);

        });

    }

    function submitVote(option){

        const token = localStorage.getItem("user_token");

        const script = document.createElement("script");

        script.src =
            `${API}?action=vote&vote=${voteID}&user=${token}&option=${encodeURIComponent(option)}&client=${CLIENT_TOKEN}&callback=voteSubmitted`;

        document.body.appendChild(script);

    }

    function voteSubmitted(res){

        if(res.error) alert(res.error);

        loadVote();

    }

    requireAuth(function(){
        loadVote();
    });

</script>
