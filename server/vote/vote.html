<h2 id="question">Loading...</h2>
<div id="options"></div>
<div id="results" style="margin-top:20px;"></div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwplqPfAiIXNnOneKC7oXhKk-h6N-rlU479altLiECu/exec";
    const CLIENT_TOKEN = "f3ae101d-d2ea-4cf2-b8b6-e7330854cf7a";

    const params = new URLSearchParams(window.location.search);
    const voteID = params.get("vote");
    let userToken = params.get("user") || localStorage.getItem("vote_user_token");

    if (!userToken) {
        userToken = prompt("Enter your voting token:");
        if (userToken) localStorage.setItem("vote_user_token", userToken);
    }

    // ----------------- LOAD VOTE -----------------
    function loadVote() {
        if (!voteID) {
            document.getElementById("question").innerText = "Invalid vote link.";
            return;
        }

        const script = document.createElement("script");
        script.src = `${API}?action=getVote&vote=${voteID}&client=${CLIENT_TOKEN}&callback=renderVote`;
        document.body.appendChild(script);
    }

    // ----------------- RENDER VOTE -----------------
    function renderVote(vote) {
        if (!vote || !vote.options) {
            document.getElementById("question").innerText = "Vote not found or no options available.";
            document.getElementById("options").innerHTML = "";
            document.getElementById("results").innerHTML = "";
            return;
        }

        document.getElementById("question").innerText = vote.question;
        const optionsDiv = document.getElementById("options");
        optionsDiv.innerHTML = "";

        vote.options.forEach(opt => {
            const btn = document.createElement("button");
            btn.style.margin = "5px";
            btn.innerText = `${opt.name} (${opt.votes} pts)`;
            btn.onclick = () => submitVote(opt.name);
            optionsDiv.appendChild(btn);
        });

        renderResults(vote.options);
    }

    // ----------------- SUBMIT VOTE -----------------
    function submitVote(option) {
        if (!option) return;
        const script = document.createElement("script");
        script.src = `${API}?action=vote&vote=${voteID}&user=${userToken}&option=${encodeURIComponent(option)}&client=${CLIENT_TOKEN}&callback=voteSubmitted`;
        document.body.appendChild(script);
    }

    // ----------------- VOTE SUBMITTED CALLBACK -----------------
    function voteSubmitted(res) {
        if (res.error) {
            alert("Error: " + res.error);
        }
        loadVote(); // Refresh vote details after submitting
    }

    // ----------------- DISPLAY RESULTS -----------------
    function renderResults(options) {
        const div = document.getElementById("results");
        if (!options || options.length === 0) {
            div.innerHTML = "<i>No votes yet.</i>";
            return;
        }
        let html = "<b>Live Results:</b><br>";
        options.forEach(opt => html += `${opt.name} — ${opt.votes} pts<br>`);
        div.innerHTML = html;
    }

    // Initial load
    loadVote();
</script>
