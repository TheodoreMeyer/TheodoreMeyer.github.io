<h2>Active Votes</h2>
<div id="votes">Authenticating...</div>

<script src="/server/js/auth.js"></script>

<script>

    function loadVotes(){

        const script = document.createElement("script");

        script.src =
            `${API}?action=listVotes&client=${CLIENT_TOKEN}&callback=renderVotes`;

        document.body.appendChild(script);

    }

    function renderVotes(votes){

        const div = document.getElementById("votes");

        if(!votes || votes.length === 0){
            div.innerHTML = "<i>No active votes.</i>";
            return;
        }

        div.innerHTML = "";

        votes.forEach(v=>{

            const card = document.createElement("div");

            card.className = "vote-card";

            card.onclick = () => {
                window.location =
                    `/server/votes/vote?vote=${v.id}&user=${localStorage.getItem("user_token")}`;
            };

            card.innerHTML =
                `<b>${v.question}</b><button>Vote</button>`;

            div.appendChild(card);

        });

    }

    // AUTH FIRST
    requireAuth(function(){
        document.getElementById("votes").innerText = "Loading votes...";
        loadVotes();
    });

</script>
