<h2>Admin Panel</h2>
<div>
    <h3>Create Vote</h3>
    Question: <input id="newQuestion"><br>
    Options (comma separated): <input id="newOptions"><br>
    <button onclick="createVote()">Create Vote</button>
</div>

<div style="margin-top:20px;">
    <h3>Existing Votes</h3>
    <div id="votes">Loading...</div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwplqPfAiIXNnOneKC7oXhKk-h6N-rlU479altLiECu/exec";
    const CLIENT_TOKEN = "f3ae101d-d2ea-4cf2-b8b6-e7330854cf7a";

    let adminToken = prompt("Enter your admin token:");

    function loadVotes() {
        const script = document.createElement("script");
        script.src = `${API}?action=adminVotes&client=${CLIENT_TOKEN}&callback=renderVotes`;
        document.body.appendChild(script);
    }

    function renderVotes(votes) {
        const div = document.getElementById("votes");
        div.innerHTML = "";
        votes.forEach(v => {
            div.innerHTML += `
      <div>
        <b>${v.question}</b> [${v.status}]
        <button onclick="closeVote('${v.id}')">Close</button>
      </div>
    `;
        });
    }

    function createVote() {
        const q = document.getElementById("newQuestion").value;
        const ops = document.getElementById("newOptions").value.split(",").map(o => o.trim());
        const script = document.createElement("script");
        script.src = `${API}?action=createVote&user=${adminToken}&question=${encodeURIComponent(q)}&options=${encodeURIComponent(ops.join("|"))}&client=${CLIENT_TOKEN}&callback=voteCreated`;
        document.body.appendChild(script);
    }

    function voteCreated(res) {
        if (res.error) alert("Error: " + res.error);
        else loadVotes();
    }

    function closeVote(voteID) {
        const script = document.createElement("script");
        script.src = `${API}?action=closeVote&vote=${voteID}&user=${adminToken}&client=${CLIENT_TOKEN}&callback=voteClosed`;
        document.body.appendChild(script);
    }

    function voteClosed(res) {
        if (res.error) alert("Error: " + res.error);
        else loadVotes();
    }

    loadVotes();
</script>
