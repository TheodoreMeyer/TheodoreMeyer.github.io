---
layout: seating_chart
title: Classroom Randomizer
permalink: /chart/
---

<div class="app">

    <!-- ================= HEADER ================= -->
    <header class="header">
        <h1>Classroom Randomizer</h1>
        <p>Seating charts and group generator</p>
    </header>

    <!-- ================= TABS ================= -->
    <nav class="tabs">
        <button id="seating-tab" class="tab active">Seating</button>
        <button id="groups-tab" class="tab">Groups</button>
    </nav>

    <!-- ================= INPUT VIEW ================= -->
    <section id="app-view">

        <!-- ===== SEATING ===== -->
        <section id="seating-section">

            <div class="card">
                <h2>Students</h2>
                <div class="card">
                    <h2>Saved Rosters</h2>

                    <select id="saved-rosters-seating">
                        <option value="">Select roster</option>
                    </select>

                    <input id="roster-name-seating" placeholder="Roster name">
                    <button id="save-roster-seating" type="button">Save</button>
                    <button class="danger" id="delete-roster-seating" type="button">
                        Delete
                    </button>
                </div>
                <h3>Add Students</h3>
                <textarea id="seating-names"></textarea>
            </div>

            <div class="card">
                <h2>Layout</h2>

                <div class="row">
                    <input id="rows" type="number" min="1" value="5">
                    <input id="columns" type="number" min="1" value="6">
                    <button id="build-grid" type="button">Build</button>
                </div>

                <div id="seat-builder" class="grid"></div>

                <button id="generate-seating" type="button">Generate Seating</button>
            </div>

        </section>

        <!-- ===== GROUPS ===== -->
        <section id="groups-section" class="hidden">

            <div class="card">
                <h2>Students</h2>
                <div class="card">
                    <h2>Saved Rosters</h2>

                    <select id="saved-rosters-groups">
                        <option value="">Select roster</option>
                    </select>

                    <input id="roster-name-groups" placeholder="Roster name">
                    <button id="save-roster-groups" type="button">Save</button>
                    <button class="danger" id="delete-roster-groups" type="button">
                        Delete
                    </button>
                </div>
                <h3>Add Students</h3>
                <textarea id="group-names"></textarea>
            </div>

            <div class="card">
                <h2>Groups</h2>

                <select id="group-mode">
                    <option value="size">Groups of Size</option>
                    <option value="count">Number of Groups</option>
                </select>

                <input id="group-value" type="number" min="1" value="4">

                <button id="generate-groups" type="button">
                    Generate Groups
                </button>
            </div>

        </section>

    </section>

    <!-- ================= RESULTS ================= -->
    <section id="results-view" class="hidden">

        <div class="results-header">
            <h1 id="results-title"></h1>
            <button id="back-button" type="button">Back</button>
        </div>

        <div id="results-content"></div>

    </section>

</div>
