<aside id="project-sidebar"></aside>

{% assign project_slug = page.project %}
{% assign prefix = "projects/" | append: project_slug %}
{% assign home_path = prefix | append: "/index.md" %}

<script id="docs-sidebar-data" type="application/json">
    [
        {% assign first = true %}
    {% assign docs = site.pages | sort: "path" %}

    {% for doc in docs %}
    {% if doc.path contains prefix %}

    {% unless first %},{% endunless %}
    {% assign first = false %}

    {
    "title": {{ doc.title | default: project_slug | jsonify }},
    "url": {{ doc.url | relative_url | jsonify }},
    "path": {{ doc.path | remove_first: prefix | remove_first: "/" | jsonify }}
    }

    {% endif %}
        {% endfor %}
    ]
</script>

<script src="{{ '/assets/js/docs_sidebar.js' | relative_url }}"></script>
