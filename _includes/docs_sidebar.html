{% assign nav = site.data.docs_nav[page.project] %}

{% if nav %}

<aside class="project-sidebar">

  <h3>{{ nav.title }}</h3>

  <ul>

    {% for item in nav.links %}

    <li>

      <a href="{{ item.url | relative_url }}"
         class="{% if page.url == item.url %}active{% endif %}">
        {{ item.title }}
      </a>

      {% if item.children %}
      <ul class="sidebar-subnav">

        {% for child in item.children %}

        <li>
          <a href="{{ child.url | relative_url }}"
             class="{% if page.url == child.url %}active{% endif %}">
            {{ child.title }}
          </a>
        </li>

        {% endfor %}

      </ul>
      {% endif %}

    </li>

    {% endfor %}

  </ul>

</aside>

{% endif %}
